<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Responsive Image Gallery</h1>

    <!-- Filter Buttons -->

    <div class="filter-buttons">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('city')">City</button>
        <button onclick="filterImages('animal')">Animal</button>
    </div>

    <!-- Gallery -->

    <div class="gallery">

        <div class="image nature">
            <img src="images/nature1.jpg" alt="">
        </div>

        <div class="image nature">
            <img src="images/nature2.jpg" alt="">
        </div>

        <div class="image city">
            <img src="images/city1.jpg" alt="">
        </div>

        <div class="image city">
            <img src="images/city2.jpg" alt="">
        </div>

        <div class="image animal">
            <img src="images/animal1.jpg" alt="">
        </div>

        <div class="image animal">
            <img src="images/animal2.jpg" alt="">
        </div>

    </div>

    <!-- Lightbox -->

    <div class="lightbox">

        <span class="close">&times;</span>

        <button class="prev">&#10094;</button>

        <img class="lightbox-img" src="" alt="">

        <button class="next">&#10095;</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
